<div id="dashboard-content" class="w-full">
    <!-- Hero search (inicial) -->
    <div class="flex flex-col items-center justify-center min-h-[75vh] text-center slide-up">
        <div class="mb-3 inline-flex items-center gap-2 px-4 py-2 rounded-full border border-blue-500/30 bg-blue-500/10 text-blue-300 text-xs font-semibold uppercase tracking-widest">
            <i data-lucide="signal" class="w-3 h-3"></i> Consulta Instantânea
        </div>
        <h1 class="text-5xl md:text-7xl font-black tracking-tight mb-5 leading-none">
            <span class="text-white">Visão </span>
            <span class="gradient-text">360°</span>
            <br />
            <span class="text-white/60 text-4xl md:text-5xl font-bold">do Cliente</span>
        </h1>
        <p class="text-white/40 text-lg max-w-lg mb-12 leading-relaxed">
            Digite o CPF ou CNPJ para centralizar conexões, faturas, contratos e atendimentos em um único painel.
        </p>

        <form hx-post="/search" hx-target="#dashboard-content" hx-indicator="#main-spinner" class="relative w-full max-w-xl group">
            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-white/25 group-focus-within:text-blue-400 transition-colors w-5 h-5"></i>
            <input
                type="text"
                name="cpf"
                placeholder="000.000.000-00"
                required
                class="w-full pl-14 pr-36 py-5 text-lg rounded-2xl border border-white/10 bg-white/[0.04] text-white placeholder-white/20 focus:outline-none focus:border-blue-500/50 focus:bg-white/[0.06] transition-all shadow-2xl"
            />
            <button
                type="submit"
                class="absolute right-2 top-2 bottom-2 px-6 rounded-xl font-bold text-white text-sm hover:opacity-90 transition-all shadow-lg flex items-center gap-2"
                style="background: linear-gradient(135deg, #4f6ef7, #06b6d4)"
            >
                <i data-lucide="loader-2" class="htmx-indicator animate-spin w-[18px] h-[18px]" id="main-spinner"></i>
                <span class="group-[.htmx-request]:hidden flex items-center gap-2">Analisar <i data-lucide="chevron-right" class="w-4 h-4"></i></span>
            </button>
        </form>

        {{if .Error}}
        <div class="mt-6 flex items-center gap-3 px-5 py-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-300 text-sm max-w-xl w-full mx-auto slide-up">
            <i data-lucide="alert-triangle" class="w-[18px] h-[18px] flex-shrink-0"></i>
            <p>{{.Error}}</p>
        </div>
        {{end}}
    </div>
</div>
