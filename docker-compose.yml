version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: clic_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clic_backend
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis:6379
      - JWT_SECRET=supersecretjwtkey
      - PORT=8080
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clic_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  backend_data:
