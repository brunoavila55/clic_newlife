version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clic_backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    volumes:
      # Persiste o banco SQLite entre reinicializações do container
      - backend_data:/app/data

volumes:
  backend_data:
