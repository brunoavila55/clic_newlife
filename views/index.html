<div id="dashboard-content" class="w-full">
    <!-- Hero search (inicial) -->
    <div id="hero-search" class="flex flex-col items-center justify-center min-h-[75vh] text-center slide-up">
        <div class="mb-3 inline-flex items-center gap-2 px-4 py-2 rounded-full border border-[#0F4C81]/20 bg-[#0F4C81]/10 text-[#0F4C81] text-xs font-bold uppercase tracking-widest">
            <i data-lucide="signal" class="w-3 h-3 text-[#00B4D8]"></i> New Life Fibra
        </div>
        <h1 class="text-5xl md:text-6xl font-black tracking-tight mb-5 leading-none">
            <span class="gradient-text">CLIC</span>
            <br />
            <span class="text-[#1F2937] text-3xl md:text-4xl font-extrabold uppercase tracking-wider block mt-2">Centro de Logs, Informações e Conexões</span>
        </h1>
        <p class="text-gray-500 text-base max-w-xl mb-12 leading-relaxed">
            Painel operacional centralizado para monitoramento e gestão em tempo real de conexões, faturas e atendimentos dos clientes New Life.
        </p>
        <form hx-post="/search" hx-target="#dashboard-content" hx-indicator="#main-spinner" class="relative w-full max-w-xl group">
            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-[#0F4C81] transition-colors w-5 h-5"></i>
            <input
                type="text"
                name="cpf"
                placeholder="000.000.000-00"
                required
                class="w-full pl-14 pr-36 py-5 text-lg rounded-2xl border border-gray-200 bg-white text-gray-800 placeholder-gray-400 focus:outline-none focus:border-[#0F4C81] focus:ring-4 focus:ring-[#0F4C81]/10 transition-all shadow-xl"
            />
            <button
                type="submit"
                class="absolute right-2 top-2 bottom-2 px-6 rounded-xl font-bold text-white text-sm hover:opacity-90 transition-all shadow-lg flex items-center gap-2"
                style="background: linear-gradient(135deg, #0F4C81, #00B4D8)"
            >
                <i data-lucide="loader-2" class="htmx-indicator animate-spin w-[18px] h-[18px]" id="main-spinner"></i>
                <span class="group-[.htmx-request]:hidden flex items-center gap-2">Analisar <i data-lucide="chevron-right" class="w-4 h-4"></i></span>
            </button>
        </form>

        {{if .Error}}
        <div class="mt-6 flex items-center gap-3 px-5 py-4 rounded-2xl bg-red-50 border border-red-200 text-red-700 text-sm max-w-xl w-full mx-auto slide-up">
            <i data-lucide="alert-triangle" class="w-[18px] h-[18px] flex-shrink-0 text-red-500"></i>
            <p class="font-medium">{{.Error}}</p>
        </div>
        {{end}}
    </div>
</div>
