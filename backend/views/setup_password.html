<div class="flex flex-col items-center justify-center min-h-[75vh] slide-up">
    <!-- Password Setup Card -->
    <div class="w-full max-w-md bg-white border border-gray-150 rounded-3xl p-8 shadow-2xl relative overflow-hidden group">
        <!-- Background light blob effect -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-[#00B4D8]/10 rounded-full blur-2xl group-hover:bg-[#00B4D8]/15 transition-all duration-500"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-[#0F4C81]/10 rounded-full blur-2xl group-hover:bg-[#0F4C81]/15 transition-all duration-500"></div>

        <div class="relative z-10 flex flex-col items-center">
            <!-- Security Shield Icon -->
            <div class="w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg shadow-black/10 mb-4"
                style="background: linear-gradient(135deg, #0F4C81 0%, #00B4D8 100%)">
                <i data-lucide="shield-alert" class="text-white w-6 h-6 animate-pulse"></i>
            </div>
            
            <h2 class="text-2xl font-black text-[#1F2937] tracking-tight">Alterar Senha Padrão</h2>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-wider mt-1 text-center max-w-xs">
                Para sua segurança, você deve configurar uma nova senha de administrador no seu primeiro acesso.
            </p>

            <!-- Alert Box for errors -->
            {{if .Error}}
            <div class="mt-6 w-full flex items-center gap-3 px-4 py-3 bg-red-50 border border-red-200 text-red-700 text-xs rounded-xl slide-up">
                <i data-lucide="alert-circle" class="w-4 h-4 text-red-500 flex-shrink-0"></i>
                <span class="font-semibold">{{.Error}}</span>
            </div>
            {{end}}

            <!-- Setup Form -->
            <form action="/admin/setup-password" method="POST" class="w-full mt-6 space-y-4">
                <div>
                    <label for="password" class="text-gray-500 text-[10px] font-bold uppercase tracking-widest block mb-2">Nova Senha</label>
                    <div class="relative">
                        <i data-lucide="key-round" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Nova senha segura"
                            required
                            class="w-full pl-11 pr-4 py-3 text-sm rounded-xl border border-gray-200 bg-gray-50/50 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-[#0F4C81] focus:ring-4 focus:ring-[#0F4C81]/5 focus:bg-white transition-all"
                        />
                    </div>
                </div>

                <div>
                    <label for="confirm_password" class="text-gray-500 text-[10px] font-bold uppercase tracking-widest block mb-2">Confirmar Nova Senha</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                        <input
                            type="password"
                            id="confirm_password"
                            name="confirm_password"
                            placeholder="Repita a nova senha"
                            required
                            class="w-full pl-11 pr-4 py-3 text-sm rounded-xl border border-gray-200 bg-gray-50/50 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-[#0F4C81] focus:ring-4 focus:ring-[#0F4C81]/5 focus:bg-white transition-all"
                        />
                    </div>
                </div>

                <button
                    type="submit"
                    class="w-full py-3.5 rounded-xl font-bold text-white text-sm hover:opacity-95 active:scale-[0.99] transition-all shadow-lg shadow-[#0F4C81]/20 mt-6 cursor-pointer"
                    style="background: linear-gradient(135deg, #0F4C81 0%, #00B4D8 100%)"
                >
                    Salvar Nova Senha
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
</script>
